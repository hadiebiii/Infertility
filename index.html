<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ناباروری و ART | مرور جامع بورد</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@100..900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: { sans: ['Vazirmatn', 'sans-serif'] },
      }
    }
  }
</script>
<style>
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Vazirmatn', sans-serif;
    background: linear-gradient(160deg, #eef2ff 0%, #f0f9ff 40%, #faf5ff 100%);
    min-height: 100vh;
  }
  .glass-card {
    background: rgba(255,255,255,0.72);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border: 1px solid rgba(255,255,255,0.6);
    box-shadow: 0 8px 32px 0 rgba(80,90,160,0.10);
  }
  .glass-strong {
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    border: 1px solid rgba(255,255,255,0.7);
  }
  .accordion-icon { transition: transform 0.3s ease; }
  .rotate-180 { transform: rotate(180deg); }
  .tab-btn { transition: all 0.25s ease; }
  .tab-active { background: linear-gradient(135deg,#4f46e5,#0ea5e9) !important; color: #fff !important; box-shadow: 0 4px 14px rgba(79,70,229,0.35); }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: #a5b4fc; border-radius: 10px; }
  .content-list li { margin-bottom: 0.55rem; line-height: 2; }
  .content-list > li::marker { color: #6366f1; font-weight: 900; }
  .sub-h { font-weight: 900; color: #3730a3; margin-top: 1.25rem; margin-bottom: 0.5rem; display:flex; align-items:center; gap:.5rem;}
  .telinde-box { background: #f5f3ff; border-inline-start: 4px solid #7c3aed; }
  .williams-box { background: #ecfeff; border-inline-start: 4px solid #0d9488; }
  .redflag-box { background: #fef2f2; border-inline-start: 4px solid #ef4444; }
  .golden-box { background: #fffbeb; border-inline-start: 4px solid #d97706; }
  table.gv-table th, table.gv-table td { padding: 0.6rem 0.9rem; text-align: right; }
  table.gv-table tr:nth-child(even) { background: rgba(99,102,241,0.05); }
  .quiz-answer { transition: all .2s ease; }
  .badge { display:inline-block; font-size:.7rem; font-weight:800; padding:.15rem .6rem; border-radius:999px; }
  .action-arrow { display:inline-flex; align-items:center; justify-content:center; width:22px; height:22px; border-radius:9999px; }
  .quiz-option { display:block; width:100%; text-align: right; font-size:.875rem; color:#334155; background:#fff; border:1px solid #cbd5e1; border-radius:.6rem; padding:.55rem .8rem; transition: all .15s ease; cursor:pointer; }
  .quiz-option:hover:not(:disabled) { border-color:#6366f1; background:#eef2ff; }
  .quiz-option:disabled { cursor:default; }
  .quiz-option.correct { border-color:#10b981; background:#ecfdf5; color:#065f46; font-weight:800; }
  .quiz-option.wrong { border-color:#ef4444; background:#fef2f2; color:#991b1b; font-weight:800; }
  .searchable-item.search-hidden { display:none !important; }
</style>
</head>
<body class="text-slate-800">

<header class="sticky top-0 z-50 glass-strong shadow-sm">
  <div class="max-w-5xl mx-auto px-4 py-3">
    <div class="flex items-center justify-between gap-3 flex-wrap">
      <div class="flex items-center gap-3">
        <div class="w-11 h-11 rounded-2xl bg-gradient-to-br from-indigo-600 to-sky-500 flex items-center justify-center text-white text-lg shadow-lg shadow-indigo-200">
          <i class="fa-solid fa-baby-carriage"></i>
        </div>
        <div>
          <h1 class="font-black text-base sm:text-lg text-slate-800 leading-tight">ناباروری و ART</h1>
        </div>
      </div>
      <nav class="flex items-center gap-1.5 bg-slate-100/80 rounded-2xl p-1.5 w-full sm:w-auto overflow-x-auto">
        <button class="tab-btn tab-active flex-1 sm:flex-none whitespace-nowrap flex items-center justify-center gap-2 px-3 sm:px-4 py-2 rounded-xl text-xs sm:text-sm font-black text-slate-600" data-tab="tab-review">
          <i class="fa-solid fa-book-open-reader"></i> مرور فصلی
        </button>
      </nav>
    </div>
  </div>
</header>

<main class="max-w-5xl mx-auto px-4 py-6">
  <div class="glass-card rounded-2xl px-4 py-3 mb-4 flex items-center gap-3">
    <i class="fa-solid fa-magnifying-glass text-slate-400"></i>
    <input id="searchInput" type="text" placeholder="جستجو در مطالب..." class="flex-1 bg-transparent outline-none text-sm font-bold text-slate-700 placeholder:text-slate-400 placeholder:font-normal">
  </div>

  <section id="tab-review" class="tab-content">
    <div id="accordion-wrap" class="space-y-4">
      <div id="loading" class="text-center py-10 text-slate-500 font-bold">
        <i class="fa-solid fa-spinner fa-spin mr-2"></i> در حال بارگذاری فصل‌ها...
      </div>
    </div>
  </section>
</main>

<script>
async function loadSections() {
  const wrap = document.getElementById('accordion-wrap');
  if (!wrap) return;

  let htmlContent = '';
  for (let i = 1; i <= 10; i++) {
    try {
      const response = await fetch(`chapters/section${i}.html`);
      if (response.ok) {
        const html = await response.text();
        htmlContent += html;
      } else {
        console.warn(`فایل section${i}.html پیدا نشد.`);
      }
    } catch (error) {
      console.error(`خطا در بارگذاری بخش ${i}:`, error);
    }
  }

  wrap.innerHTML = htmlContent;
}

document.addEventListener('DOMContentLoaded', loadSections);

document.addEventListener('click', function(e){
  const accHeader = e.target.closest('.accordion-header');
  if (accHeader) {
    const body = document.getElementById(accHeader.dataset.target);
    const icon = accHeader.querySelector('.accordion-icon');
    if (body) body.classList.toggle('hidden');
    if (icon) icon.classList.toggle('rotate-180');
    return;
  }

  const opt = e.target.closest('.quiz-option');
  if (opt) {
    const group = opt.closest('.quiz-options');
    if (group && group.dataset.answered === 'false') {
      group.dataset.answered = 'true';
      group.querySelectorAll('.quiz-option').forEach(function(btn){
        btn.disabled = true;
        if (btn.dataset.correct === 'true') btn.classList.add('correct');
        else if (btn === opt) btn.classList.add('wrong');
      });
      const ans = document.getElementById(group.dataset.target);
      if (ans) ans.classList.remove('hidden');
    }
  }
});

const searchInput = document.getElementById('searchInput');
if (searchInput) {
  searchInput.addEventListener('input', function(){
    const q = searchInput.value.trim().toLowerCase();
    document.querySelectorAll('.searchable-item').forEach(function(item){
      const text = item.textContent.toLowerCase();
      const match = q === '' || text.includes(q);
      item.classList.toggle('search-hidden', !match);
      if (match && q.length > 2) {
        const body = item.closest('.accordion-body');
        if (body) {
          body.classList.remove('hidden');
          const header = document.querySelector('.accordion-header[data-target="' + body.id + '"]');
          if (header) {
            const icon = header.querySelector('.accordion-icon');
            if (icon) icon.classList.add('rotate-180');
          }
        }
      }
    });
  });
}
</script>
</body>
</html>
